name: Build & Release SabjiWala Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version and Generate Tag
        id: get-version
        run: |
          BASE_VERSION=$(jq -r '.version' version.json)
          
          # If triggered by a tag push, extract it
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            FULL_VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Triggered by push to main or workflow_dispatch
            # Format: v{base_version}.{run_number}
            FULL_VERSION="${BASE_VERSION}.${{ github.run_number }}"
            
            # Configure Git
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            TAG_NAME="v${FULL_VERSION}"
            echo "Creating and pushing tag $TAG_NAME"
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi
          
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $FULL_VERSION"

  build-push-docker:
    needs: read-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
        image_type: [backend, web, complete]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Build Arguments & Metadata
        id: meta
        run: |
          PLATFORM_CLEAN=$(echo "${{ matrix.platform }}" | sed 's/\//-/g')
          echo "PLATFORM_CLEAN=$PLATFORM_CLEAN" >> $GITHUB_ENV
          
          # Setup Context and Dockerfile
          if [ "${{ matrix.image_type }}" = "backend" ]; then
            echo "CONTEXT=apps/backend" >> $GITHUB_ENV
            echo "DOCKERFILE=infrastructure/docker/Dockerfile.backend" >> $GITHUB_ENV
          elif [ "${{ matrix.image_type }}" = "complete" ]; then
            echo "CONTEXT=." >> $GITHUB_ENV
            echo "DOCKERFILE=infrastructure/docker/Dockerfile.complete" >> $GITHUB_ENV
          else
            echo "CONTEXT=." >> $GITHUB_ENV
            echo "DOCKERFILE=infrastructure/docker/Dockerfile.web" >> $GITHUB_ENV
          fi

          # Generate tags (GHCR only)
          TAGS="ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:${{ needs.read-version.outputs.version }}-${PLATFORM_CLEAN}"
          echo "TAGS=$TAGS" >> $GITHUB_ENV

      - name: Build and Push Platform-Specific Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha,scope=${{ matrix.image_type }}-${{ env.PLATFORM_CLEAN }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_type }}-${{ env.PLATFORM_CLEAN }}

  release-docker-manifests:
    needs: [read-version, build-push-docker]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image_type: [backend, web, complete]
    steps:
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push GHCR Manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:${{ needs.read-version.outputs.version }} \
            -t ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:latest \
            ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:${{ needs.read-version.outputs.version }}-linux-amd64 \
            ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:${{ needs.read-version.outputs.version }}-linux-arm64

  build-web-zip:
    needs: read-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            apps/sabjiwala-web/package.json
            shared/package.json

      - name: Build Shared Package
        run: |
          cd shared
          npm install
          npm run build

      - name: Setup Web App
        run: |
          cd apps/sabjiwala-web
          npm install
          
          # Replace symlink with physical copy of shared package to satisfy Turbopack
          rm -rf node_modules/@sabjiwala/shared
          mkdir -p node_modules/@sabjiwala/shared
          cp -r ../../shared/dist node_modules/@sabjiwala/shared/
          cp -r ../../shared/src node_modules/@sabjiwala/shared/
          cp ../../shared/package.json node_modules/@sabjiwala/shared/
          cp ../../shared/tsconfig.json node_modules/@sabjiwala/shared/

      - name: Copy Dashboard Views to Web App
        run: |
          mkdir -p apps/sabjiwala-web/src/app/vendor apps/sabjiwala-web/src/app/delivery apps/sabjiwala-web/src/app/admin
          cp apps/customer-app/src/app/page.tsx apps/sabjiwala-web/src/app/page.tsx
          cp apps/vendor-app/src/app/page.tsx apps/sabjiwala-web/src/app/vendor/page.tsx
          cp apps/delivery-app/src/app/page.tsx apps/sabjiwala-web/src/app/delivery/page.tsx
          cp apps/admin-app/src/app/page.tsx apps/sabjiwala-web/src/app/admin/page.tsx

      - name: Build Web App Static Export
        run: |
          cd apps/sabjiwala-web
          npm run build

      - name: Zip Web App Static Export
        run: |
          cd apps/sabjiwala-web/out
          zip -r ../../../sabjiwala-web-static.zip .

      - name: Upload Web App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: sabjiwala-web-static.zip

  build-android:
    needs: read-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Shared Package
        run: |
          cd shared
          npm install
          npm run build

      - name: Setup Android Keystore
        id: android_keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Using production keystore from secrets."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.keystore
            echo "HAS_PROD_KEYSTORE=true" >> $GITHUB_ENV
            echo "KEYSTORE_FILE=$GITHUB_WORKSPACE/release.keystore" >> $GITHUB_ENV
            echo "STORE_PASS=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "Using self-signed fallback keystore."
            keytool -genkey -v -keystore $GITHUB_WORKSPACE/release.keystore -alias sabjiwala -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=sabjiwala.in, OU=Dev, O=SabjiWala, L=Mumbai, S=MH, C=IN" \
              -storepass password -keypass password
            echo "HAS_PROD_KEYSTORE=false" >> $GITHUB_ENV
            echo "KEYSTORE_FILE=$GITHUB_WORKSPACE/release.keystore" >> $GITHUB_ENV
            echo "STORE_PASS=password" >> $GITHUB_ENV
            echo "KEY_ALIAS=sabjiwala" >> $GITHUB_ENV
            echo "KEY_PASS=password" >> $GITHUB_ENV
          fi

      # ── Customer App ────────────────────────────────────────────────────────
      - name: Build & Sync Customer App (Android)
        run: |
          cd apps/customer-app
          npm install
          rm -rf node_modules/@sabjiwala/shared
          mkdir -p node_modules/@sabjiwala/shared
          cp -r ../../shared/dist node_modules/@sabjiwala/shared/
          cp -r ../../shared/src  node_modules/@sabjiwala/shared/
          cp ../../shared/package.json node_modules/@sabjiwala/shared/
          npm run build
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android
          npx cap sync android
          printf '\nconfigurations.all {\n    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"\n    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"\n}\n' >> android/app/build.gradle

      - name: Compile & Sign Customer Android App
        run: |
          cd apps/customer-app/android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$STORE_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASS
          cp app/build/outputs/apk/release/app-release.apk \
            $GITHUB_WORKSPACE/sabjiwala-customer-v${{ needs.read-version.outputs.version }}.apk
          cp app/build/outputs/bundle/release/app-release.aab \
            $GITHUB_WORKSPACE/sabjiwala-customer-v${{ needs.read-version.outputs.version }}.aab

      - name: Upload Customer App to Play Store
        if: env.HAS_PROD_KEYSTORE == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          packageName: com.sabjiwala.customer
          releaseFiles: sabjiwala-customer-v${{ needs.read-version.outputs.version }}.aab
          track: internal
          status: completed

      # ── Vendor App ──────────────────────────────────────────────────────────
      - name: Build & Sync Vendor App (Android)
        run: |
          cd apps/vendor-app
          npm install
          rm -rf node_modules/@sabjiwala/shared
          mkdir -p node_modules/@sabjiwala/shared
          cp -r ../../shared/dist node_modules/@sabjiwala/shared/
          cp -r ../../shared/src  node_modules/@sabjiwala/shared/
          cp ../../shared/package.json node_modules/@sabjiwala/shared/
          npm run build
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android
          npx cap sync android
          printf '\nconfigurations.all {\n    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"\n    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"\n}\n' >> android/app/build.gradle

      - name: Compile & Sign Vendor Android App
        run: |
          cd apps/vendor-app/android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$STORE_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASS
          cp app/build/outputs/apk/release/app-release.apk \
            $GITHUB_WORKSPACE/sabjiwala-vendor-v${{ needs.read-version.outputs.version }}.apk
          cp app/build/outputs/bundle/release/app-release.aab \
            $GITHUB_WORKSPACE/sabjiwala-vendor-v${{ needs.read-version.outputs.version }}.aab

      - name: Upload Vendor App to Play Store
        if: env.HAS_PROD_KEYSTORE == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          packageName: com.sabjiwala.vendor
          releaseFiles: sabjiwala-vendor-v${{ needs.read-version.outputs.version }}.aab
          track: internal
          status: completed

      # ── Delivery App ────────────────────────────────────────────────────────
      - name: Build & Sync Delivery App (Android)
        run: |
          cd apps/delivery-app
          npm install
          rm -rf node_modules/@sabjiwala/shared
          mkdir -p node_modules/@sabjiwala/shared
          cp -r ../../shared/dist node_modules/@sabjiwala/shared/
          cp -r ../../shared/src  node_modules/@sabjiwala/shared/
          cp ../../shared/package.json node_modules/@sabjiwala/shared/
          npm run build
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android
          npx cap sync android
          printf '\nconfigurations.all {\n    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"\n    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"\n}\n' >> android/app/build.gradle

      - name: Compile & Sign Delivery Android App
        run: |
          cd apps/delivery-app/android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$STORE_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASS
          cp app/build/outputs/apk/release/app-release.apk \
            $GITHUB_WORKSPACE/sabjiwala-delivery-v${{ needs.read-version.outputs.version }}.apk
          cp app/build/outputs/bundle/release/app-release.aab \
            $GITHUB_WORKSPACE/sabjiwala-delivery-v${{ needs.read-version.outputs.version }}.aab

      - name: Upload Delivery App to Play Store
        if: env.HAS_PROD_KEYSTORE == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          packageName: com.sabjiwala.delivery
          releaseFiles: sabjiwala-delivery-v${{ needs.read-version.outputs.version }}.aab
          track: internal
          status: completed

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            sabjiwala-customer-v${{ needs.read-version.outputs.version }}.apk
            sabjiwala-vendor-v${{ needs.read-version.outputs.version }}.apk
            sabjiwala-delivery-v${{ needs.read-version.outputs.version }}.apk
            sabjiwala-customer-v${{ needs.read-version.outputs.version }}.aab
            sabjiwala-vendor-v${{ needs.read-version.outputs.version }}.aab
            sabjiwala-delivery-v${{ needs.read-version.outputs.version }}.aab

  build-ios:
    needs: read-version
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Build Shared Package
        run: |
          cd shared
          npm install
          npm run build

      - name: Install Apple Certificate and Provisioning Profiles
        id: apple_cert
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "HAS_APPLE_CERTS=true" >> $GITHUB_ENV
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
          else
            echo "HAS_APPLE_CERTS=false" >> $GITHUB_ENV
          fi

      - name: Setup App Store Connect API Key
        if: env.HAS_APPLE_CERTS == 'true'
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      # ── Customer App ────────────────────────────────────────────────────────
      - name: Build & Sync Customer App (iOS)
        run: |
          cd apps/customer-app
          npm install
          rm -rf node_modules/@sabjiwala/shared
          mkdir -p node_modules/@sabjiwala/shared
          cp -r ../../shared/dist node_modules/@sabjiwala/shared/
          cp -r ../../shared/src  node_modules/@sabjiwala/shared/
          cp ../../shared/package.json node_modules/@sabjiwala/shared/
          npm run build
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap add ios || true
          sed -i '' "s/platform :ios, .*/platform :ios, '14.0'/" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec \
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9][0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' {} \;
          npx cap sync ios

      - name: Compile Customer iOS App
        run: |
          cd apps/customer-app/ios/App
          if [ "$HAS_APPLE_CERTS" = "true" ]; then
            cat << EOF > ExportOptions.plist
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store</string>
            </dict>
            </plist>
          EOF
            xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath $GITHUB_WORKSPACE/CustomerApp.xcarchive
            xcodebuild -exportArchive -archivePath $GITHUB_WORKSPACE/CustomerApp.xcarchive -exportPath $GITHUB_WORKSPACE/CustomerApp -exportOptionsPlist ExportOptions.plist
            mv $GITHUB_WORKSPACE/CustomerApp/*.ipa $GITHUB_WORKSPACE/sabjiwala-customer-v${{ needs.read-version.outputs.version }}-ios.ipa
          else
            xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -configuration Release -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=NO build
            BUILD_DIR=$(xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -configuration Release -showBuildSettings 2>/dev/null | grep " BUILT_PRODUCTS_DIR " | awk '{print $3}')
            zip -r $GITHUB_WORKSPACE/sabjiwala-customer-v${{ needs.read-version.outputs.version }}-ios.zip "$BUILD_DIR/App.app"
          fi

      - name: Upload Customer App to App Store Connect
        if: env.HAS_APPLE_CERTS == 'true'
        run: |
          xcrun altool --upload-app -f $GITHUB_WORKSPACE/sabjiwala-customer-v${{ needs.read-version.outputs.version }}-ios.ipa \
            -t ios --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"

      # ── Vendor App ──────────────────────────────────────────────────────────
      - name: Build & Sync Vendor App (iOS)
        run: |
          cd apps/vendor-app
          npm install
          rm -rf node_modules/@sabjiwala/shared
          mkdir -p node_modules/@sabjiwala/shared
          cp -r ../../shared/dist node_modules/@sabjiwala/shared/
          cp -r ../../shared/src  node_modules/@sabjiwala/shared/
          cp ../../shared/package.json node_modules/@sabjiwala/shared/
          npm run build
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap add ios || true
          sed -i '' "s/platform :ios, .*/platform :ios, '14.0'/" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec \
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9][0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' {} \;
          npx cap sync ios

      - name: Compile Vendor iOS App
        run: |
          cd apps/vendor-app/ios/App
          if [ "$HAS_APPLE_CERTS" = "true" ]; then
            cat << EOF > ExportOptions.plist
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store</string>
            </dict>
            </plist>
          EOF
            xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath $GITHUB_WORKSPACE/VendorApp.xcarchive
            xcodebuild -exportArchive -archivePath $GITHUB_WORKSPACE/VendorApp.xcarchive -exportPath $GITHUB_WORKSPACE/VendorApp -exportOptionsPlist ExportOptions.plist
            mv $GITHUB_WORKSPACE/VendorApp/*.ipa $GITHUB_WORKSPACE/sabjiwala-vendor-v${{ needs.read-version.outputs.version }}-ios.ipa
          else
            xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -configuration Release -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=NO build
            BUILD_DIR=$(xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -configuration Release -showBuildSettings 2>/dev/null | grep " BUILT_PRODUCTS_DIR " | awk '{print $3}')
            zip -r $GITHUB_WORKSPACE/sabjiwala-vendor-v${{ needs.read-version.outputs.version }}-ios.zip "$BUILD_DIR/App.app"
          fi

      - name: Upload Vendor App to App Store Connect
        if: env.HAS_APPLE_CERTS == 'true'
        run: |
          xcrun altool --upload-app -f $GITHUB_WORKSPACE/sabjiwala-vendor-v${{ needs.read-version.outputs.version }}-ios.ipa \
            -t ios --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"

      # ── Delivery App ────────────────────────────────────────────────────────
      - name: Build & Sync Delivery App (iOS)
        run: |
          cd apps/delivery-app
          npm install
          rm -rf node_modules/@sabjiwala/shared
          mkdir -p node_modules/@sabjiwala/shared
          cp -r ../../shared/dist node_modules/@sabjiwala/shared/
          cp -r ../../shared/src  node_modules/@sabjiwala/shared/
          cp ../../shared/package.json node_modules/@sabjiwala/shared/
          npm run build
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap add ios || true
          sed -i '' "s/platform :ios, .*/platform :ios, '14.0'/" ios/App/Podfile
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec \
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9][0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' {} \;
          npx cap sync ios

      - name: Compile Delivery iOS App
        run: |
          cd apps/delivery-app/ios/App
          if [ "$HAS_APPLE_CERTS" = "true" ]; then
            cat << EOF > ExportOptions.plist
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store</string>
            </dict>
            </plist>
          EOF
            xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath $GITHUB_WORKSPACE/DeliveryApp.xcarchive
            xcodebuild -exportArchive -archivePath $GITHUB_WORKSPACE/DeliveryApp.xcarchive -exportPath $GITHUB_WORKSPACE/DeliveryApp -exportOptionsPlist ExportOptions.plist
            mv $GITHUB_WORKSPACE/DeliveryApp/*.ipa $GITHUB_WORKSPACE/sabjiwala-delivery-v${{ needs.read-version.outputs.version }}-ios.ipa
          else
            xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -configuration Release -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=NO build
            BUILD_DIR=$(xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -configuration Release -showBuildSettings 2>/dev/null | grep " BUILT_PRODUCTS_DIR " | awk '{print $3}')
            zip -r $GITHUB_WORKSPACE/sabjiwala-delivery-v${{ needs.read-version.outputs.version }}-ios.zip "$BUILD_DIR/App.app"
          fi

      - name: Upload Delivery App to App Store Connect
        if: env.HAS_APPLE_CERTS == 'true'
        run: |
          xcrun altool --upload-app -f $GITHUB_WORKSPACE/sabjiwala-delivery-v${{ needs.read-version.outputs.version }}-ios.ipa \
            -t ios --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-builds
          path: |
            sabjiwala-customer-v${{ needs.read-version.outputs.version }}-ios.*
            sabjiwala-vendor-v${{ needs.read-version.outputs.version }}-ios.*
            sabjiwala-delivery-v${{ needs.read-version.outputs.version }}-ios.*

  create-release:
    needs: [read-version, release-docker-manifests, build-web-zip, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Web App Static Export
        uses: actions/download-artifact@v4
        with:
          name: web-static

      - name: Download Android APKS
        uses: actions/download-artifact@v4
        with:
          name: android-apks

      - name: Download iOS Builds
        uses: actions/download-artifact@v4
        with:
          name: ios-builds

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.read-version.outputs.version }}
          name: SabjiWala Release v${{ needs.read-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            sabjiwala-web-static.zip
            sabjiwala-customer-v${{ needs.read-version.outputs.version }}.apk
            sabjiwala-vendor-v${{ needs.read-version.outputs.version }}.apk
            sabjiwala-delivery-v${{ needs.read-version.outputs.version }}.apk
            sabjiwala-customer-v${{ needs.read-version.outputs.version }}.aab
            sabjiwala-vendor-v${{ needs.read-version.outputs.version }}.aab
            sabjiwala-delivery-v${{ needs.read-version.outputs.version }}.aab
            sabjiwala-customer-v${{ needs.read-version.outputs.version }}-ios.*
            sabjiwala-vendor-v${{ needs.read-version.outputs.version }}-ios.*
            sabjiwala-delivery-v${{ needs.read-version.outputs.version }}-ios.*
          body: |
            # SabjiWala Platform Release v${{ needs.read-version.outputs.version }}

            We are pleased to announce the production release of the SabjiWala eCommerce Platform, version `${{ needs.read-version.outputs.version }}`. All sub-platforms have been compiled, synced, and packaged.

            ## Release Contents
            - **Docker Containers**:
              - **FastAPI Backend (Multi-Arch AMD64/ARM64)**:
                - GitHub Packages: `ghcr.io/${{ github.repository }}/backend:v${{ needs.read-version.outputs.version }}`
              - **Unified Nginx Web Portal (Multi-Arch AMD64/ARM64)**:
                - GitHub Packages: `ghcr.io/${{ github.repository }}/web:v${{ needs.read-version.outputs.version }}`
              - **Complete Stack (Backend & Frontend Proxied, Multi-Arch AMD64/ARM64)**:
                - GitHub Packages: `ghcr.io/${{ github.repository }}/complete:v${{ needs.read-version.outputs.version }}`
            - **Static Web files**: `sabjiwala-web-static.zip`
            - **Android Apps (Capacitor/Gradle)**:
              - [Customer App] `.apk` and `.aab` bundles
              - [Vendor App] `.apk` and `.aab` bundles
              - [Delivery App] `.apk` and `.aab` bundles
            - **iOS Payload Bundles**:
              - [Customer App] `.ipa` (signed) or `.zip` (simulator)
              - [Vendor App] `.ipa` (signed) or `.zip` (simulator)
              - [Delivery App] `.ipa` (signed) or `.zip` (simulator)

            ## Deployment instructions
            1. **Docker Deployment**: Update your orchestrator/k8s manifests to pull the multi-arch images.
            2. **Android**: Install the signed APKs directly on target Android test devices.
            3. **iOS**: Code-sign the `.app` bundle from the zip files before deployment to testing devices.
