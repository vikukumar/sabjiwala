name: Build & Release Sbjiwala Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL (e.g., https://api.example.com/api/v1)'
        required: false
        type: string
        default: 'https://sbjiwala.qzz.io/api/v1'
      build_ios:
        description: 'Build, sign, upload, and release iOS apps'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  API_URL: ${{ github.event.inputs.api_url || 'https://sbjiwala.qzz.io/api/v1' }}

# ─────────────────────────────────────────────────────────────────────────────
# Helper shell function injected by every step that needs to copy the shared pkg
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 1. Version
  # ═══════════════════════════════════════════════════════════════════════════
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version and Generate Tag
        id: get-version
        run: |
          BASE_VERSION=$(jq -r '.version' version.json)

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            FULL_VERSION=${GITHUB_REF#refs/tags/v}
          else
            FULL_VERSION="${BASE_VERSION}.${{ github.run_number }}"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            TAG_NAME="v${FULL_VERSION}"
            echo "Creating and pushing tag $TAG_NAME"
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $FULL_VERSION"

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. Docker — backend / web / complete (multi-arch)
  # ═══════════════════════════════════════════════════════════════════════════
  build-push-docker:
    needs: read-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
        image_type: [backend, web, complete]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Build Arguments & Metadata
        id: meta
        run: |
          PLATFORM_CLEAN=$(echo "${{ matrix.platform }}" | sed 's/\//-/g')
          echo "PLATFORM_CLEAN=$PLATFORM_CLEAN" >> $GITHUB_ENV

          if [ "${{ matrix.image_type }}" = "backend" ]; then
            echo "CONTEXT=apps/backend"          >> $GITHUB_ENV
            echo "DOCKERFILE=infrastructure/docker/Dockerfile.backend" >> $GITHUB_ENV
          elif [ "${{ matrix.image_type }}" = "complete" ]; then
            echo "CONTEXT=."                      >> $GITHUB_ENV
            echo "DOCKERFILE=infrastructure/docker/Dockerfile.complete" >> $GITHUB_ENV
          else
            echo "CONTEXT=."                      >> $GITHUB_ENV
            echo "DOCKERFILE=infrastructure/docker/Dockerfile.web" >> $GITHUB_ENV
          fi

          TAGS="ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:${{ needs.read-version.outputs.version }}-${PLATFORM_CLEAN}"
          echo "TAGS=$TAGS" >> $GITHUB_ENV

      - name: Build and Push Platform-Specific Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha,scope=${{ matrix.image_type }}-${{ env.PLATFORM_CLEAN }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_type }}-${{ env.PLATFORM_CLEAN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. Docker manifests
  # ═══════════════════════════════════════════════════════════════════════════
  release-docker-manifests:
    needs: [read-version, build-push-docker]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image_type: [backend, web, complete]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push GHCR Manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:${{ needs.read-version.outputs.version }} \
            -t ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:latest \
            ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:${{ needs.read-version.outputs.version }}-linux-amd64 \
            ghcr.io/${{ github.repository }}/${{ matrix.image_type }}:${{ needs.read-version.outputs.version }}-linux-arm64

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. Web apps — sbjiwala-web + agent-app (Next.js static zips)
  # ═══════════════════════════════════════════════════════════════════════════
  build-web-zip:
    needs: read-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            apps/sbjiwala-web/package.json
            apps/agent-app/package.json
            shared/package.json

      # ── Shared package ────────────────────────────────────────────────────
      - name: Build Shared Package
        run: |
          cd shared
          npm install --no-audit --no-fund
          npm run build

      # ── sbjiwala-web ──────────────────────────────────────────────────────
      - name: Install & Patch sbjiwala-web
        run: |
          cd apps/sbjiwala-web
          npm install --no-audit --no-fund
          rm -rf node_modules/@sbjiwala/shared
          mkdir -p node_modules/@sbjiwala/shared
          cp -r ../../shared/dist     node_modules/@sbjiwala/shared/
          cp -r ../../shared/src      node_modules/@sbjiwala/shared/
          cp ../../shared/package.json node_modules/@sbjiwala/shared/
          cp ../../shared/tsconfig.json node_modules/@sbjiwala/shared/

      - name: Sync sub-app pages into sbjiwala-web
        run: |
          mkdir -p apps/sbjiwala-web/src/app/vendor \
                   apps/sbjiwala-web/src/app/delivery \
                   apps/sbjiwala-web/src/app/admin
          cp apps/customer-app/src/app/page.tsx  apps/sbjiwala-web/src/app/page.tsx
          cp apps/vendor-app/src/app/page.tsx    apps/sbjiwala-web/src/app/vendor/page.tsx
          cp -r apps/vendor-app/src/app/kyc      apps/sbjiwala-web/src/app/
          cp apps/delivery-app/src/app/page.tsx  apps/sbjiwala-web/src/app/delivery/page.tsx
          cp apps/admin-app/src/app/page.tsx     apps/sbjiwala-web/src/app/admin/page.tsx
          cp -r apps/admin-app/src/app/users     apps/sbjiwala-web/src/app/

      - name: Build sbjiwala-web Static Export
        run: |
          VER="${{ needs.read-version.outputs.version }}"
          cd apps/sbjiwala-web
          echo "NEXT_PUBLIC_APP_VERSION=$VER" > .env.production
          echo "{\"version\": \"$VER\"}" > src/app/version.json
          NEXT_PUBLIC_APP_VERSION="$VER" npm run build

      - name: Zip sbjiwala-web Static Export
        run: |
          cd apps/sbjiwala-web/out
          zip -r ../../../sbjiwala-web-static.zip .

      # ── agent-app (Next.js only — no Capacitor) ───────────────────────────
      - name: Install & Patch agent-app
        run: |
          cd apps/agent-app
          npm install --no-audit --no-fund
          rm -rf node_modules/@sbjiwala/shared
          mkdir -p node_modules/@sbjiwala/shared
          cp -r ../../shared/dist      node_modules/@sbjiwala/shared/
          cp -r ../../shared/src       node_modules/@sbjiwala/shared/
          cp ../../shared/package.json node_modules/@sbjiwala/shared/
          cp ../../shared/tsconfig.json node_modules/@sbjiwala/shared/

      - name: Build agent-app Static Export
        run: |
          VER="${{ needs.read-version.outputs.version }}"
          cd apps/agent-app
          echo "NEXT_PUBLIC_APP_VERSION=$VER" > .env.production
          echo "{\"version\": \"$VER\"}" > src/app/version.json
          NEXT_PUBLIC_APP_VERSION="$VER" npm run build

      - name: Zip agent-app Static Export
        run: |
          cd apps/agent-app/out
          zip -r ../../../sbjiwala-agent-v${{ needs.read-version.outputs.version }}-web.zip .

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: |
            sbjiwala-web-static.zip
            sbjiwala-agent-v${{ needs.read-version.outputs.version }}-web.zip

  # ═══════════════════════════════════════════════════════════════════════════
  # 5. Android — customer, vendor, delivery, admin, agent (matrix parallel)
  # ═══════════════════════════════════════════════════════════════════════════
  build-android:
    needs: read-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: customer-app
            prefix: sbjiwala
            package_name: in.sbjiwala.customer
            upload_playstore: false
          - app: vendor-app
            prefix: sbjiwala-vendor
            package_name: in.sbjiwala.vendor
            upload_playstore: false
          - app: delivery-app
            prefix: sbjiwala-delivery
            package_name: in.sbjiwala.delivery
            upload_playstore: false
          - app: admin-app
            prefix: sbjiwala-admin
            upload_playstore: false
          - app: agent-app
            prefix: sbjiwala-agent
            upload_playstore: false
    env:
      VER: ${{ needs.read-version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Shared Package
        run: |
          cd shared
          npm install --no-audit --no-fund
          npm run build

      # ── Keystore setup ────────────────────────────────────────────────────
      - name: Setup Android Keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Using production keystore from secrets."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.keystore
            echo "HAS_PROD_KEYSTORE=true"                        >> $GITHUB_ENV
            echo "KEYSTORE_FILE=$GITHUB_WORKSPACE/release.keystore" >> $GITHUB_ENV
            echo "STORE_PASS=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"    >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.ANDROID_KEY_PASSWORD }}"  >> $GITHUB_ENV
          else
            echo "Using self-signed fallback keystore."
            keytool -genkey -v \
              -keystore $GITHUB_WORKSPACE/release.keystore \
              -alias sbjiwala -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=sbjiwala.qzz.io, OU=Dev, O=Sbjiwala, L=Mumbai, S=MH, C=IN" \
              -storepass password -keypass password
            echo "HAS_PROD_KEYSTORE=false"                           >> $GITHUB_ENV
            echo "KEYSTORE_FILE=$GITHUB_WORKSPACE/release.keystore"  >> $GITHUB_ENV
            echo "STORE_PASS=password"   >> $GITHUB_ENV
            echo "KEY_ALIAS=sbjiwala"    >> $GITHUB_ENV
            echo "KEY_PASS=password"     >> $GITHUB_ENV
          fi

          if [ -n "${{ secrets.PLAY_STORE_CONFIG_JSON }}" ]; then
            echo "HAS_PLAY_STORE_CONFIG=true"  >> $GITHUB_ENV
          else
            echo "HAS_PLAY_STORE_CONFIG=false" >> $GITHUB_ENV
          fi

      # ── Firebase google-services.json injection ───────────────────────────
      - name: Inject Firebase google-services.json Files
        run: |
          APP="${{ matrix.app }}"
          
          if [ "$APP" = "customer-app" ]; then
            if [ -n "${{ secrets.GOOGLE_SERVICES_CUSTOMER_BASE64 }}" ]; then
              echo "${{ secrets.GOOGLE_SERVICES_CUSTOMER_BASE64 }}" | base64 --decode > apps/$APP/android/app/google-services.json
              echo "✅ $APP google-services.json injected"
            else
              echo "⚠️  GOOGLE_SERVICES_CUSTOMER_BASE64 not set"
            fi
          elif [ "$APP" = "vendor-app" ]; then
            if [ -n "${{ secrets.GOOGLE_SERVICES_VENDOR_BASE64 }}" ]; then
              echo "${{ secrets.GOOGLE_SERVICES_VENDOR_BASE64 }}" | base64 --decode > apps/$APP/android/app/google-services.json
              echo "✅ $APP google-services.json injected"
            else
              echo "⚠️  GOOGLE_SERVICES_VENDOR_BASE64 not set"
            fi
          elif [ "$APP" = "delivery-app" ]; then
            if [ -n "${{ secrets.GOOGLE_SERVICES_DELIVERY_BASE64 }}" ]; then
              echo "${{ secrets.GOOGLE_SERVICES_DELIVERY_BASE64 }}" | base64 --decode > apps/$APP/android/app/google-services.json
              echo "✅ $APP google-services.json injected"
            else
              echo "⚠️  GOOGLE_SERVICES_DELIVERY_BASE64 not set"
            fi
          elif [ "$APP" = "admin-app" ]; then
            if [ -n "${{ secrets.GOOGLE_SERVICES_ADMIN_BASE64 }}" ]; then
              echo "${{ secrets.GOOGLE_SERVICES_ADMIN_BASE64 }}" | base64 --decode > apps/$APP/android/app/google-services.json
              echo "✅ $APP google-services.json injected"
            else
              echo "⚠️  GOOGLE_SERVICES_ADMIN_BASE64 not set"
            fi
          elif [ "$APP" = "agent-app" ]; then
            if [ -n "${{ secrets.GOOGLE_SERVICES_AGENT_BASE64 }}" ]; then
              echo "${{ secrets.GOOGLE_SERVICES_AGENT_BASE64 }}" | base64 --decode > apps/$APP/android/app/google-services.json
              echo "✅ $APP google-services.json injected"
            else
              echo "⚠️  GOOGLE_SERVICES_AGENT_BASE64 not set"
            fi
          fi

      # ── Reusable helper ───────────────────────────────────────────────────
      - name: Define shared build helper
        run: |
          cat << 'HELPER' > /tmp/build_next_app.sh
          #!/usr/bin/env bash
          set -euo pipefail
          APP=$1
          FULL_VER=${2:-"1.0"}
          cd "apps/$APP"

          # ── Inject build-time version into .env.production ─────────────────
          echo "NEXT_PUBLIC_APP_VERSION=$FULL_VER" > .env.production
          if [ -n "${API_URL:-}" ]; then
            echo "NEXT_PUBLIC_API_URL=$API_URL" >> .env.production
          fi

          # ── Write full version into src/app/version.json (read by all apps) ─
          mkdir -p src/app
          echo "{\"version\": \"$FULL_VER\"}" > src/app/version.json

          # ── Shared package install (─ npm install, not npm ci: no lock file in CI) ─
          npm install --prefer-offline --no-audit --no-fund
          rm -rf node_modules/@sbjiwala/shared
          mkdir -p node_modules/@sbjiwala/shared
          cp -r ../../shared/dist      node_modules/@sbjiwala/shared/
          cp -r ../../shared/src       node_modules/@sbjiwala/shared/
          cp ../../shared/package.json node_modules/@sbjiwala/shared/

          # ── Build (version injected via env, not npm version which requires semver) ─
          if [ -n "${API_URL:-}" ]; then
            NEXT_PUBLIC_API_URL="$API_URL" NEXT_PUBLIC_APP_VERSION="$FULL_VER" npm run build
          else
            NEXT_PUBLIC_APP_VERSION="$FULL_VER" npm run build
          fi
          npm install @capacitor/core @capacitor/cli @capacitor/android --no-audit --no-fund
          npx cap sync android
          
          # Fix Kotlin Version Mismatch and Add Stream ProGuard Rules idempotently
          cd ../../
          node scripts/fix_android.js
          cd apps/$APP
          HELPER
          chmod +x /tmp/build_next_app.sh

      # ── Gradle sign helper ────────────────────────────────────────────────
      - name: Define Gradle sign helper
        run: |
          cat << 'HELPER' > /tmp/gradle_sign.sh
          #!/usr/bin/env bash
          set -euo pipefail
          APP_DIR=$1   # e.g. apps/customer-app
          APK_NAME=$2  # e.g. sbjiwala-v1.0.apk
          AAB_NAME=$3  # e.g. sbjiwala-v1.0.aab
          cd "$APP_DIR/android"
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$STORE_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASS
          cp app/build/outputs/apk/release/app-release.apk    "$GITHUB_WORKSPACE/$APK_NAME"
          cp app/build/outputs/bundle/release/app-release.aab "$GITHUB_WORKSPACE/$AAB_NAME"
          HELPER
          chmod +x /tmp/gradle_sign.sh

      # ── Compute Android version numbers from pipeline tag ─────────────────
      - name: Compute Android Version Numbers
        run: |
          VER="${{ env.VER }}"
          LAST_SEGMENT=$(echo "$VER" | awk -F. '{print $NF}')
          echo "ANDROID_VERSION_CODE=$LAST_SEGMENT" >> $GITHUB_ENV
          echo "ANDROID_VERSION_NAME=$VER"          >> $GITHUB_ENV
          echo "Android versionCode: $LAST_SEGMENT"
          echo "Android versionName: $VER"

      # ── App Build ─────────────────────────────────────────────────────────
      - name: Build & Sync ${{ matrix.app }} (Android)
        env:
          API_URL: ${{ env.API_URL }}
        run: /tmp/build_next_app.sh ${{ matrix.app }} "${{ env.VER }}"

      - name: Compile & Sign ${{ matrix.app }} Android App
        run: |
          ANDROID_VERSION_CODE="${{ env.ANDROID_VERSION_CODE }}" \
          ANDROID_VERSION_NAME="${{ env.ANDROID_VERSION_NAME }}" \
          /tmp/gradle_sign.sh apps/${{ matrix.app }} \
            "${{ matrix.prefix }}-v${{ env.VER }}.apk" \
            "${{ matrix.prefix }}-v${{ env.VER }}.aab"

      - name: Upload ${{ matrix.app }} to Play Store
        if: matrix.upload_playstore == true && env.HAS_PROD_KEYSTORE == 'true' && env.HAS_PLAY_STORE_CONFIG == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          packageName: ${{ matrix.package_name }}
          releaseFiles: ${{ matrix.prefix }}-v${{ env.VER }}.aab
          track: internal
          status: completed

      - name: Create per-app zip bundles
        run: |
          VER="${{ env.VER }}"
          cd $GITHUB_WORKSPACE

          ZIP_NAME="${{ matrix.prefix }}-v${VER}-android.zip"
          if [ "${{ matrix.app }}" = "customer-app" ]; then
             ZIP_NAME="sbjiwala-customer-v${VER}-android.zip"
          fi

          zip $ZIP_NAME \
            ${{ matrix.prefix }}-v${VER}.apk \
            ${{ matrix.prefix }}-v${VER}.aab

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ matrix.app }}
          path: |
            ${{ matrix.prefix }}-v${{ env.VER }}.apk
            ${{ matrix.prefix }}-v${{ env.VER }}.aab
            *-android.zip

  # ═══════════════════════════════════════════════════════════════════════════
  # 6. iOS — customer, vendor, delivery (macOS runner)
  # ═══════════════════════════════════════════════════════════════════════════
  build-ios:
    needs: read-version
    runs-on: macos-latest
    if: ${{ github.event_name == 'push' && (github.event.inputs.build_ios != 'false' && github.event.inputs.build_ios != false) }}
    env:
      VER: ${{ needs.read-version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Build Shared Package
        run: |
          cd shared
          npm install --no-audit --no-fund
          npm run build

      # ── Apple certificates ────────────────────────────────────────────────
      - name: Install Apple Certificate and Provisioning Profiles
        id: apple_cert
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "HAS_APPLE_CERTS=true" >> $GITHUB_ENV
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
          else
            echo "HAS_APPLE_CERTS=false" >> $GITHUB_ENV
          fi

          if [ -n "${{ secrets.APPSTORE_KEY_ID }}" ]; then
            echo "HAS_APPSTORE_KEY=true"  >> $GITHUB_ENV
          else
            echo "HAS_APPSTORE_KEY=false" >> $GITHUB_ENV
          fi

      - name: Setup App Store Connect API Key
        if: env.HAS_APPLE_CERTS == 'true' && env.HAS_APPSTORE_KEY == 'true'
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > \
            ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      # ── iOS build helper ──────────────────────────────────────────────────
      - name: Define iOS build helper
        run: |
          cat << 'HELPER' > /tmp/build_ios_app.sh
          #!/usr/bin/env bash
          set -euo pipefail
          APP=$1
          cd "apps/$APP"
          if [ -n "${API_URL:-}" ]; then
            echo "NEXT_PUBLIC_API_URL=$API_URL" > .env.production
          fi
          npm install --no-audit --no-fund
          rm -rf node_modules/@sbjiwala/shared
          mkdir -p node_modules/@sbjiwala/shared
          cp -r ../../shared/dist       node_modules/@sbjiwala/shared/
          cp -r ../../shared/src        node_modules/@sbjiwala/shared/
          cp ../../shared/package.json  node_modules/@sbjiwala/shared/
          if [ -n "${API_URL:-}" ]; then
            NEXT_PUBLIC_API_URL="$API_URL" npm run build
          else
            npm run build
          fi
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          sed -i '' "s/platform :ios, .*/platform :ios, '16.0'/" ios/App/Podfile || true
          find ios/App/App.xcodeproj -name "project.pbxproj" -exec \
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9][0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' {} \; || true
          npx cap sync ios
          HELPER
          chmod +x /tmp/build_ios_app.sh

      # ── iOS compile helper ────────────────────────────────────────────────
      - name: Define iOS compile helper
        run: |
          cat << 'HELPER' > /tmp/compile_ios_app.sh
          #!/usr/bin/env bash
          set -euo pipefail
          APP=$1        # customer-app
          ARCHIVE=$2    # CustomerApp
          IPA_NAME=$3   # sbjiwala-v1.0-ios.ipa
          ZIP_NAME=$4   # sbjiwala-v1.0-ios.zip

          cd "apps/$APP/ios/App"

          EXPORT_PLIST="ExportOptions.plist"
          cat > $EXPORT_PLIST <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict><key>method</key><string>app-store</string></dict></plist>
          PLIST

          if [ "${HAS_APPLE_CERTS}" = "true" ]; then
            xcodebuild -workspace App.xcworkspace -scheme App \
              -sdk iphoneos -configuration Release \
              archive -archivePath "$GITHUB_WORKSPACE/$ARCHIVE.xcarchive"
            xcodebuild -exportArchive \
              -archivePath "$GITHUB_WORKSPACE/$ARCHIVE.xcarchive" \
              -exportPath "$GITHUB_WORKSPACE/$ARCHIVE" \
              -exportOptionsPlist $EXPORT_PLIST
            mv "$GITHUB_WORKSPACE/$ARCHIVE"/*.ipa "$GITHUB_WORKSPACE/$IPA_NAME"
          else
            xcodebuild -workspace App.xcworkspace -scheme App \
              -sdk iphonesimulator -configuration Release \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=NO build
            BUILD_DIR=$(xcodebuild -workspace App.xcworkspace -scheme App \
              -sdk iphonesimulator -configuration Release \
              -showBuildSettings 2>/dev/null | grep " BUILT_PRODUCTS_DIR " | awk '{print $3}')
            zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$BUILD_DIR/App.app"
          fi
          HELPER
          chmod +x /tmp/compile_ios_app.sh

      # ── Customer iOS ──────────────────────────────────────────────────────
      - name: Build & Sync Customer App (iOS)
        env:
          API_URL: ${{ env.API_URL }}
        run: /tmp/build_ios_app.sh customer-app

      - name: Compile Customer iOS App
        run: |
          /tmp/compile_ios_app.sh customer-app CustomerApp \
            "sbjiwala-v${{ env.VER }}-ios.ipa" \
            "sbjiwala-v${{ env.VER }}-ios.zip"

      - name: Upload Customer App to App Store Connect
        if: env.HAS_APPLE_CERTS == 'true' && env.HAS_APPSTORE_KEY == 'true'
        run: |
          xcrun altool --upload-app \
            -f "$GITHUB_WORKSPACE/sbjiwala-v${{ env.VER }}-ios.ipa" \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"

      # ── Vendor iOS ────────────────────────────────────────────────────────
      - name: Build & Sync Vendor App (iOS)
        env:
          API_URL: ${{ env.API_URL }}
        run: /tmp/build_ios_app.sh vendor-app

      - name: Compile Vendor iOS App
        run: |
          /tmp/compile_ios_app.sh vendor-app VendorApp \
            "sbjiwala-vendor-v${{ env.VER }}-ios.ipa" \
            "sbjiwala-vendor-v${{ env.VER }}-ios.zip"

      - name: Upload Vendor App to App Store Connect
        if: env.HAS_APPLE_CERTS == 'true' && env.HAS_APPSTORE_KEY == 'true'
        run: |
          xcrun altool --upload-app \
            -f "$GITHUB_WORKSPACE/sbjiwala-vendor-v${{ env.VER }}-ios.ipa" \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"

      # ── Delivery iOS ──────────────────────────────────────────────────────
      - name: Build & Sync Delivery App (iOS)
        env:
          API_URL: ${{ env.API_URL }}
        run: /tmp/build_ios_app.sh delivery-app

      - name: Compile Delivery iOS App
        run: |
          /tmp/compile_ios_app.sh delivery-app DeliveryApp \
            "sbjiwala-delivery-v${{ env.VER }}-ios.ipa" \
            "sbjiwala-delivery-v${{ env.VER }}-ios.zip"

      - name: Upload Delivery App to App Store Connect
        if: env.HAS_APPLE_CERTS == 'true' && env.HAS_APPSTORE_KEY == 'true'
        run: |
          xcrun altool --upload-app \
            -f "$GITHUB_WORKSPACE/sbjiwala-delivery-v${{ env.VER }}-ios.ipa" \
            -t ios \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-builds
          path: |
            sbjiwala-v${{ env.VER }}-ios.*
            sbjiwala-vendor-v${{ env.VER }}-ios.*
            sbjiwala-delivery-v${{ env.VER }}-ios.*

  # ═══════════════════════════════════════════════════════════════════════════
  # 7. GitHub Release — attach all build artifacts
  # ═══════════════════════════════════════════════════════════════════════════
  create-release:
    needs: [read-version, release-docker-manifests, build-web-zip, build-android, build-ios]
    runs-on: ubuntu-latest
    env:
      VER: ${{ needs.read-version.outputs.version }}
    if: |
      always() &&
      needs.read-version.result == 'success' &&
      (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped') &&
      needs.build-android.result == 'success' &&
      needs.build-web-zip.result == 'success' &&
      needs.release-docker-manifests.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Web Artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-static
          path: ./

      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: ./

      - name: Download iOS Builds
        if: ${{ needs.build-ios.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: ios-builds
          path: ./

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VER }}
          name: Sbjiwala Release v${{ env.VER }}
          draft: false
          prerelease: false
          files: |
            sbjiwala-web-static.zip
            sbjiwala-agent-v${{ env.VER }}-web.zip
            sbjiwala-customer-v${{ env.VER }}-android.zip
            sbjiwala-vendor-v${{ env.VER }}-android.zip
            sbjiwala-delivery-v${{ env.VER }}-android.zip
            sbjiwala-admin-v${{ env.VER }}-android.zip
            sbjiwala-agent-v${{ env.VER }}-android.zip
            sbjiwala-v${{ env.VER }}.apk
            sbjiwala-vendor-v${{ env.VER }}.apk
            sbjiwala-delivery-v${{ env.VER }}.apk
            sbjiwala-admin-v${{ env.VER }}.apk
            sbjiwala-agent-v${{ env.VER }}.apk
            sbjiwala-v${{ env.VER }}.aab
            sbjiwala-vendor-v${{ env.VER }}.aab
            sbjiwala-delivery-v${{ env.VER }}.aab
            sbjiwala-admin-v${{ env.VER }}.aab
            sbjiwala-agent-v${{ env.VER }}.aab
            sbjiwala-v${{ env.VER }}-ios.*
            sbjiwala-vendor-v${{ env.VER }}-ios.*
            sbjiwala-delivery-v${{ env.VER }}-ios.*
          body: |
            # Sbjiwala Platform Release v${{ env.VER }}

            Production release of the Sbjiwala eCommerce Platform. All sub-platforms compiled, signed, and packaged.

            ## 📦 Release Contents

            ### Docker Images (Multi-Arch AMD64 + ARM64)
            | Image | GHCR Tag |
            |---|---|
            | FastAPI Backend | `ghcr.io/${{ github.repository }}/backend:v${{ env.VER }}` |
            | Unified Web Portal | `ghcr.io/${{ github.repository }}/web:v${{ env.VER }}` |
            | Complete Stack | `ghcr.io/${{ github.repository }}/complete:v${{ env.VER }}` |

            ### Web Apps (Static Exports)
            | App | File |
            |---|---|
            | Sbjiwala Web (unified portal) | `sbjiwala-web-static.zip` |
            | Agent Support App | `sbjiwala-agent-v${{ env.VER }}-web.zip` |

            ### Android Apps (APK + AAB zip bundles)
            | App | Bundle |
            |---|---|
            | Customer App | `sbjiwala-customer-v${{ env.VER }}-android.zip` |
            | Vendor App | `sbjiwala-vendor-v${{ env.VER }}-android.zip` |
            | Delivery App | `sbjiwala-delivery-v${{ env.VER }}-android.zip` |
            | Admin App | `sbjiwala-admin-v${{ env.VER }}-android.zip` |
            | Agent Support App | `sbjiwala-agent-v${{ env.VER }}-android.zip` |

            ### iOS Builds (if enabled)
            | App | File |
            |---|---|
            | Customer App | `sbjiwala-v${{ env.VER }}-ios.ipa` / `.zip` |
            | Vendor App | `sbjiwala-vendor-v${{ env.VER }}-ios.ipa` / `.zip` |
            | Delivery App | `sbjiwala-delivery-v${{ env.VER }}-ios.ipa` / `.zip` |

            ## 🚀 Deployment Instructions

            ### Docker
            ```bash
            # Pull and run the complete stack
            docker pull ghcr.io/${{ github.repository }}/complete:v${{ env.VER }}
            docker pull ghcr.io/${{ github.repository }}/backend:v${{ env.VER }}
            ```

            ### Android
            1. Download the per-app zip, extract APK + AAB.
            2. Install APK directly: `adb install sbjiwala-v${{ env.VER }}.apk`
            3. Submit AAB to Google Play Console for store release.

            ### iOS
            - **Signed `.ipa`**: Submit via App Store Connect.
            - **Simulator `.zip`**: Unzip and install on simulator via Xcode.

            ### Static Web
            Extract `sbjiwala-web-static.zip` into your Nginx/CDN web root.
            Extract `sbjiwala-agent-v${{ env.VER }}-web.zip` to serve the agent support portal at `/agent`.
