services:
  postgres:
    image: postgres:17-alpine
    container_name: sbjiwala_postgres
    restart: always
    environment:
      POSTGRES_DB: sbjiwala
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sbjiwala"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: sbjiwala_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: ./infrastructure/docker/Dockerfile.complete
    container_name: sbjiwala_complete_app
    restart: always
    environment:
      - APP_NAME=Sbjiwala
      - APP_ENV=production
      - APP_DEBUG=True
      - APP_SECRET_KEY=sbjiwala-super-secret-key-change-this-in-production
      - JWT_SECRET_KEY=sbjiwala-jwt-secret-key-change-this-in-production
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=password
      - DATABASE_DB=sbjiwala
      - DATABASE_SSL=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_SSL=false
      - LOG_LEVEL=INFO
      - RATE_LIMIT_ENABLED=False
      - CORS_ORIGINS=http://localhost,http://127.0.0.1
      # SMTP Settings (for OTP and transactional emails)
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your-email@gmail.com
      - SMTP_PASSWORD=your-app-password
      - SMTP_FROM_NAME=Sbjiwala
      - SMTP_FROM_EMAIL=noreply@sbjiwala.qzz.io
      # Social OAuth2 Settings (Google & Facebook)
      - GOOGLE_CLIENT_ID=your-google-client-id
      - GOOGLE_CLIENT_SECRET=your-google-client-secret
      - GOOGLE_REDIRECT_URI=http://localhost/auth/callback/google
      - FACEBOOK_CLIENT_ID=your-facebook-client-id
      - FACEBOOK_CLIENT_SECRET=your-facebook-client-secret
      - FACEBOOK_REDIRECT_URI=http://localhost/auth/callback/facebook
      # Multi-Domain Routing Settings
      - CUSTOMER_DOMAIN=${CUSTOMER_DOMAIN:-customer.sbjiwala.local}
      - VENDOR_DOMAIN=${VENDOR_DOMAIN:-vendor.sbjiwala.local}
      - DELIVERY_DOMAIN=${DELIVERY_DOMAIN:-delivery.sbjiwala.local}
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-admin.sbjiwala.local}
      - API_DOMAIN=${API_DOMAIN:-api.sbjiwala.local}
      - BACKEND_URL=${BACKEND_URL:-http://127.0.0.1:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "80:8080"
      - "8000:8080"
    volumes:
      - storage_data:/app/storage

volumes:
  pg_data:
  redis_data:
  storage_data:
