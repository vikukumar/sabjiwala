            proxy_send_timeout 86400s;
        }
    }

    # Admin App Domain
    server {
        listen 8080;
        server_name $ADMIN_DOMAIN;

        location /_next/ {
            alias /usr/share/nginx/html/_next/;
        }

        location / {
            root /usr/share/nginx/html/admin;
            index index.html;
